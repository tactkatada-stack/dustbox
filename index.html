<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>映像のダストボックス</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <div class="bin-video-wrap">
      <video id="binVideo" muted loop playsinline autoplay></video>
      <div class="bin-placeholder" id="binPlaceholder">
        動画未設定<br />
        <span id="placeholderStage"></span>
      </div>
      <button id="soundToggle" class="sound-toggle" type="button">🔇 音声をオンにする</button>
    </div>

    <p class="percent" id="percentLabel">-- %</p>
    <p class="updated" id="updatedLabel"></p>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
